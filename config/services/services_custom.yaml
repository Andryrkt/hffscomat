services:
  # Services spécifiques
  App\Service\ExcelService:
    public: true

  App\Service\FusionPdf:
    public: true

  App\Service\SessionManagerService:
    public: true

  # Historique d'opération
  App\Service\historiqueOperation\HistoriqueOperationDevisMagasinService:
    arguments:
      - "@doctrine.orm.default_entity_manager"
    public: true

  App\Service\historiqueOperation\atelier\dit\Devis\HistoriqueOperationDEVService:
    arguments:
      - "@doctrine.orm.default_entity_manager"
    public: true

  App\Service\historiqueOperation\Atelier\Dit\ORs\HistoriqueOperationORService:
    arguments:
      - "@doctrine.orm.default_entity_manager"
    public: true

  App\Service\historiqueOperation\Atelier\Dit\HistoriqueOperationDITService:
    arguments:
      - "@doctrine.orm.default_entity_manager"
    public: true

  App\Service\historiqueOperation\atelier\dit\Ri\HistoriqueOperationRIService:
    arguments:
      - "@doctrine.orm.default_entity_manager"
    public: true

  App\Service\historiqueOperation\atelier\dit\Facture\HistoriqueOperationFACService:
    arguments:
      - "@doctrine.orm.default_entity_manager"
    public: true

  App\Service\historiqueOperation\magasin\bc\HistoriqueOperationBcMagasinService:
    arguments:
      - "@doctrine.orm.default_entity_manager"
    public: true

  App\Service\fichier\UploderFileService:
    arguments:
      $cheminDeBase: "%env(BASE_PATH_FICHIER)%/magasin/devis/"
    public: true

  App\Model\LdapModel:
    public: true

  App\Controller\authentification\LoginController:
    autowire: true
    autoconfigure: true
    arguments:
      - "@doctrine.orm.default_entity_manager"
      - '@App\Model\LdapModel'
    public: true

  App\Service\Admin\PermissionsService:
    arguments:
      $entityManager: "@doctrine.orm.default_entity_manager"
    public: true

  # Utilisateur et Profil
  App\Factory\admin\UserFactory:
    public: true

  App\Factory\admin\PermissionsFactory:
    public: true

  App\Controller\admin\UserController:
    arguments:
      - '@App\Factory\admin\UserFactory'
    public: true

  App\Controller\admin\appStructure\PermissionController:
    arguments:
      $entityManager: "@doctrine.orm.default_entity_manager"
      $permissionsService: '@App\Service\Admin\PermissionsService'
      $permissionsFactory: '@App\Factory\admin\PermissionsFactory'
    public: true

  App\Controller\Atelier\Dit\DitListeController:
    arguments:
      - '@App\Model\Atelier\Dit\DitListeModel'
    public: true

  App\Controller\Atelier\Planning\PlanningAtelierController:
    arguments:
      - '@App\Service\atelier\Planning\PlanningAtelierService'
      - '@App\Model\Atelier\Planning\PlanningAtelierModel'
    public: true
